apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: featureflag
  name: featureflag
  labels:
    app: featureflag
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      service: featureflag
  template:
    metadata:
      labels:
        app: featureflag
        service: featureflag
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'featureflag'
        vault.hashicorp.com/agent-inject-secret-env: 'secret/data/featureflag'
        vault.hashicorp.com/agent-inject-template-env: |
          {{ with secret "secret/data/featureflag" }}
          {{ range $k, $v := .Data.data }}
          {{ $k }}='{{ $v }}'
          {{ end }}
          {{ end }}
    spec:
      serviceAccountName: featureflag
      imagePullSecrets:
      - name: featureflag-registry-secret
      
      containers:
        - name: featureflag
          image: docker.io/cahityusuf/featureflag:v69
          command: ["/bin/sh", "-c"]
          args:
            - |
              set +x
                if [ -f /vault/secrets/env ]; then
                    grep -v '^#' /vault/secrets/env | sed 's/^/export /' > /tmp/formatted_env
                    . /tmp/formatted_env >/dev/null 2>&1
                fi
                exec dotnet FeatureFlag.dll
          ports:
          - name: http
            containerPort: 80
            protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m     
          
                   