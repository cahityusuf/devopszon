apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: shopping-api-3a1cac9f76be5093ad301c971ced745b
  name: shopping-api
  labels:
    app: shopping-api
    project-id: shopping-api-3a1cac9f-76a1-4907-60bd-a4f9029e0248
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      service: shopping-api
      project-id: shopping-api-3a1cac9f-76a1-4907-60bd-a4f9029e0248
  template:
    metadata:
      labels:
        app: shopping-api
        service: shopping-api
        project-id: shopping-api-3a1cac9f-76a1-4907-60bd-a4f9029e0248
      annotations:
        vault.hashicorp.com/agent-inject: 'false'
    spec:
      serviceAccountName: shopping-api
      imagePullSecrets:
      - name: shopping-api-registry-secret
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              echo 'Fixing permissions for application directories...'
              # Uygulama dizinini environment variable'dan al, yoksa /app kullan
              APP_DIR=${APP_WORKING_DIR:-/app}
              echo "Working directory: $APP_DIR"
              
              # Dizin varsa izinleri düzenle
              if [ -d "$APP_DIR" ]; then
                chown -R 1000:1000 "$APP_DIR"
                chmod -R 755 "$APP_DIR"
                echo "Permissions fixed for $APP_DIR"
              else
                echo "Directory $APP_DIR not found, creating it..."
                mkdir -p "$APP_DIR"
                chown -R 1000:1000 "$APP_DIR"
                chmod -R 755 "$APP_DIR"
                echo "Created and fixed permissions for $APP_DIR"
              fi
              
              # Yaygın uygulama dizinlerini de kontrol et
              for dir in /app /usr/src/app /var/www /opt/app /home/app; do
                if [ -d "$dir" ] && [ "$dir" != "$APP_DIR" ]; then
                  echo "Fixing permissions for common directory: $dir"
                  chown -R 1000:1000 "$dir"
                  chmod -R 755 "$dir"
                fi
              done
              
              echo 'Permission fixing completed successfully'
          env:
            - name: APP_WORKING_DIR
              value: '/app'
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
          volumeMounts:
            - name: app-volume
              mountPath: /app
            - name: usr-src-app-volume
              mountPath: /usr/src/app
            - name: var-www-volume
              mountPath: /var/www
            - name: opt-app-volume
              mountPath: /opt/app
            - name: home-app-volume
              mountPath: /home/app
      volumes:
      - name: app-volume
        emptyDir: {}
      - name: usr-src-app-volume
        emptyDir: {}
      - name: var-www-volume
        emptyDir: {}
      - name: opt-app-volume
        emptyDir: {}
      - name: home-app-volume
        emptyDir: {}
      containers:
        - name: shopping-api
          image: docker.io/cahityusuf/shopping-api:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec dotnet Shopping.API.dll
          ports:
          - name: http
            containerPort: 80
            protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - SETGID
                - SETUID
                - DAC_OVERRIDE
                - FSETID
                - NET_BIND_SERVICE
          resources:
            requests:
              memory: 512Mi
              cpu: 0.5
            limits:
              memory: 512Mi
              cpu: 0.5     
          
             